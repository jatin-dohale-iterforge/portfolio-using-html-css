<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="utility.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <div id="form-box" class="center">
        <h1 id="Form Heading">Student Registration Form</h1>
        <form action="">

            <!-- name box -->
            <div id="student-name-box">
                <div class="center">
                    <label for="first-name" class="">First Name</label>
                    <input id="first-name" class="deactive-link" type="text" placeholder="Eg.Jatin">
                </div>
                <div class="center">
                    <label for="middle-name" class="">Middle Name</label>
                    <input id="middle-name" class="deactive-link" type="text" placeholder="Eg.Ganesh">
                </div>
                <div class="center">
                    <label for="last-name" class="">Last Name</label>
                    <input id="last-name" class="deactive-link" type="text" placeholder="Eg.Dohale">
                </div>
            </div>

        </form>
    </div>
    <script src="registration.js"></script>
</body>

</html>
